version: '3.8'

services:
  todo-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-backend-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge
